services:
  db:
    image: postgres:16-alpine
    container_name: ansils-blog-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ansils_blog
      POSTGRES_USER: ansil
      POSTGRES_PASSWORD: ansil_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ansil -d ansils_blog"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ansils-blog-api
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: postgres://ansil:ansil_password@db:5432/ansils_blog
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: ansils-blog-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
